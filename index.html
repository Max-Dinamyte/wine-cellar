<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wine Cellar">
<meta name="theme-color" content="#1a0a0e">
<title>Max Dinamyte's Wine Cellar</title>
<link rel="manifest" href="./manifest.json">
<style>
:root {
  --bg: #1a0a0e; --bg2: #241014; --bg3: #2e161a; --card: #2a1218;
  --border: #4a2530; --gold: #c8a882; --gold2: #e0c9a6;
  --red: #8b2635; --red2: #a83040;
  --text: #f0e8df; --text2: #b8a898; --text3: #7a6858;
  --serif: Georgia, 'Times New Roman', serif;
  --sans: -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-title { font-family: var(--serif); font-size: 18px; color: var(--gold2); letter-spacing: .03em; }
.header-subtitle { font-size: 11px; color: var(--text3); letter-spacing: .12em; text-transform: uppercase; margin-top: 1px; }
.btn-add {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--red); border: none; color: var(--gold2); font-size: 24px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}
.btn-add:active { background: var(--red2); }

/* TABS */
.tab-bar { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); }
.tab-btn {
  flex: 1; padding: 13px; font-size: 14px; font-family: var(--serif);
  background: transparent; border: none; border-bottom: 2px solid transparent;
  color: var(--text3); cursor: pointer; transition: all .15s;
}
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* SEARCH */
.search-bar { padding: 12px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none; }
.search-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 14px 9px 36px;
  color: var(--text); font-size: 15px; font-family: var(--sans); outline: none;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--gold); }

/* SORT BAR */
.sort-bar {
  display: flex; gap: 8px; padding: 10px 16px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.sort-bar::-webkit-scrollbar { display: none; }
.sort-chip {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border); background: transparent; color: var(--text2);
  cursor: pointer; letter-spacing: .04em; font-family: var(--sans); transition: all .15s;
}
.sort-chip.active { background: var(--red); border-color: var(--red); color: var(--gold2); }

/* BACKUP BAR */
.backup-bar { display: flex; gap: 10px; padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); }
.backup-btn {
  flex: 1; padding: 8px 12px; border-radius: 10px; font-size: 13px; font-family: var(--sans);
  border: 1px solid var(--border); background: var(--bg3); color: var(--gold); cursor: pointer;
}
.backup-btn:active { background: var(--border); }

/* WINE LIST */
.wine-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: calc(env(safe-area-inset-bottom,0px) + 20px); }
.wine-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  overflow: hidden; display: flex; align-items: stretch; cursor: pointer;
}
.wine-card:active { border-color: var(--gold); }
.wine-card-img { width: 70px; flex-shrink: 0; background: var(--bg3); overflow: hidden; display: flex; align-items: center; justify-content: center; }
.wine-card-img img { width: 100%; height: 100%; object-fit: cover; }
.wine-card-img .no-photo { font-size: 28px; opacity: .35; }
.wine-card-body { flex: 1; padding: 12px 14px; min-width: 0; }
.wine-card-name { font-family: var(--serif); font-size: 16px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.wine-card-meta { font-size: 12px; color: var(--text3); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wine-card-footer { display: flex; align-items: center; justify-content: space-between; }
.wine-rating-badge { display: flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 3px 8px; }
.wine-rating-badge .score { font-size: 14px; font-weight: 600; color: var(--gold); font-family: var(--serif); }
.wine-rating-badge .max { font-size: 11px; color: var(--text3); }
.wine-varietal-tag { font-size: 11px; color: var(--text3); background: var(--bg3); border-radius: 6px; padding: 2px 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }

/* CELLAR LIST */
.cellar-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: calc(env(safe-area-inset-bottom,0px) + 20px); }
.cellar-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: flex; align-items: stretch; cursor: pointer; }
.cellar-card:active { border-color: var(--gold); }
.cellar-card-img { width: 70px; flex-shrink: 0; background: var(--bg3); overflow: hidden; display: flex; align-items: center; justify-content: center; }
.cellar-card-img img { width: 100%; height: 100%; object-fit: cover; }
.cellar-card-img .no-photo { font-size: 28px; opacity: .35; }
.cellar-card-body { flex: 1; padding: 12px 14px; min-width: 0; }
.cellar-card-name { font-family: var(--serif); font-size: 16px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.cellar-card-meta { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
.cellar-qty-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 3px 8px; font-size: 12px; color: var(--text2); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 30px; color: var(--text3); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: .5; }
.empty-state h3 { font-family: var(--serif); font-size: 18px; color: var(--text2); margin-bottom: 8px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* OVERLAY */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; }
.overlay.open { display: block; }

/* SHEET (forms) */
.sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  max-height: calc(100vh - env(safe-area-inset-top,44px) - 10px);
  background: var(--bg2); border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column;
  animation: slideUp .3s cubic-bezier(.32,.72,0,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
.sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sheet-title { font-family: var(--serif); font-size: 18px; color: var(--gold); }
.sheet-header-actions { display: flex; align-items: center; gap: 8px; }
.btn-cancel { padding: 8px 14px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-size: 14px; font-family: var(--sans); cursor: pointer; }
.btn-cancel:active { background: var(--border); }
.btn-close { width: 44px; height: 44px; border-radius: 50%; background: var(--bg3); border: none; color: var(--text2); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-close:active { background: var(--border); }

/* FORM BODY */
.form-body { padding: 20px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; min-height: 0; }
.form-row { display: flex; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.form-label { font-size: 11px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
.form-input, .form-textarea {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  padding: 11px 14px; color: var(--text); font-size: 15px; font-family: var(--sans);
  outline: none; width: 100%; -webkit-appearance: none; appearance: none;
}
.form-input:focus, .form-textarea:focus { border-color: var(--gold); }
.form-textarea { resize: none; min-height: 90px; line-height: 1.5; }
.form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }

/* PHOTO PICKER */
.photo-picker {
  position: relative; border: 2px dashed var(--border); border-radius: 12px;
  overflow: hidden; height: 160px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; background: var(--bg3);
}
.photo-picker:active { border-color: var(--gold); }
.photo-picker img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.photo-picker-label { text-align: center; color: var(--text3); pointer-events: none; z-index: 1; }
.photo-picker-label .icon { font-size: 28px; margin-bottom: 6px; }
.photo-picker-label p { font-size: 13px; }

/* RATING */
.rating-display { text-align: center; margin-bottom: 4px; }
.rating-number { font-family: var(--serif); font-size: 42px; color: var(--gold); line-height: 1; }
.rating-label { font-size: 12px; color: var(--text3); margin-top: 2px; }
.rating-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--border); outline: none; margin: 8px 0 4px; }
.rating-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--gold); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
.rating-ticks { display: flex; justify-content: space-between; padding: 0 2px; }
.rating-ticks span { font-size: 10px; color: var(--text3); width: 20px; text-align: center; }
.btn-save { background: var(--red); border: none; border-radius: 12px; padding: 15px; color: var(--gold2); font-size: 16px; font-family: var(--serif); cursor: pointer; width: 100%; margin-top: 4px; }
.btn-save:active { background: var(--red2); }

/* DETAIL SHEET */
.detail-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  max-height: calc(100vh - env(safe-area-inset-top,44px) - 10px);
  background: var(--bg2); border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column;
  animation: slideUp .3s cubic-bezier(.32,.72,0,1);
}
.detail-sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: var(--bg2); border-radius: 20px 20px 0 0;
}
.detail-drag-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
.detail-scroll-body { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; min-height: 0; }
.detail-photo { width: 100%; background: var(--bg3); }
.detail-photo img { width: 100%; height: auto; display: block; }
.detail-photo .no-photo { font-size: 64px; opacity: .2; padding: 60px 0; text-align: center; }
.detail-body { padding: 16px 20px; }
.detail-name { font-family: var(--serif); font-size: 24px; color: var(--text); margin-bottom: 4px; }
.detail-meta { font-size: 14px; color: var(--text3); margin-bottom: 20px; }
.detail-score-row { display: flex; align-items: center; gap: 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
.detail-score-num { font-family: var(--serif); font-size: 48px; color: var(--gold); line-height: 1; flex-shrink: 0; }
.detail-score-info { flex: 1; }
.detail-score-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.detail-score-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; }
.detail-score-label { font-size: 12px; color: var(--text3); }
.detail-section-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.detail-notes { font-size: 15px; color: var(--text2); line-height: 1.7; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; white-space: pre-wrap; margin-bottom: 16px; font-family: var(--serif); font-style: italic; }
.detail-actions { display: flex; gap: 10px; }
.btn-edit, .btn-delete { flex: 1; border-radius: 10px; padding: 14px; font-size: 15px; font-family: var(--sans); cursor: pointer; border: 1px solid var(--border); }
.btn-edit { background: var(--bg3); color: var(--text); }
.btn-delete { background: transparent; color: #c04040; border-color: #6a2020; }
.btn-edit:active { background: var(--border); }
.btn-delete:active { background: #3a1010; }

/* FLOATING CLOSE */
#floating-close {
  display: none; position: fixed;
  bottom: calc(env(safe-area-inset-bottom,0px) + 28px);
  left: 50%; transform: translateX(-50%);
  z-index: 9999; background: var(--bg2);
  border: 2px solid var(--gold); color: var(--gold);
  font-size: 16px; font-family: var(--sans);
  padding: 16px 48px; border-radius: 50px;
  letter-spacing: .05em; cursor: pointer;
  box-shadow: 0 4px 24px rgba(0,0,0,.6);
  white-space: nowrap;
}
#floating-close:active { background: var(--bg3); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Max Dinamyte's Wine Cellar</div>
    <div class="header-subtitle">Wine Journal</div>
  </div>
  <button class="btn-add" id="btn-add" aria-label="Add">+</button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="journal">Journal</button>
  <button class="tab-btn" data-tab="cellar">My Cellar</button>
</div>

<!-- JOURNAL TAB -->
<div class="tab-panel active" id="tab-journal">
  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="search" placeholder="Search wines, vintages, regions…">
    </div>
  </div>
  <div class="sort-bar">
    <button class="sort-chip active" data-sort="date">Recent</button>
    <button class="sort-chip" data-sort="rating">Highest rated</button>
    <button class="sort-chip" data-sort="name">Name A–Z</button>
    <button class="sort-chip" data-sort="vintage">Vintage</button>
  </div>
  <div class="backup-bar">
    <button class="backup-btn" id="btn-export">⬇ Export backup</button>
    <button class="backup-btn" id="btn-import">⬆ Import backup</button>
    <input type="file" id="import-input" accept=".json" style="display:none">
  </div>
  <div class="wine-list" id="wine-list"></div>
</div>

<!-- CELLAR TAB -->
<div class="tab-panel" id="tab-cellar">
  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="cellar-search-input" type="search" placeholder="Search your cellar…">
    </div>
  </div>
  <div class="cellar-list" id="cellar-list"></div>
</div>

<!-- JOURNAL FORM OVERLAY -->
<div class="overlay" id="form-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="form-title">Add a wine</span>
      <div class="sheet-header-actions">
        <button class="btn-cancel" id="form-cancel">Cancel</button>
        <button class="btn-close" id="form-close">✕</button>
      </div>
    </div>
    <div class="form-body">
      <div class="form-group">
        <div class="form-label">Label photo</div>
        <div class="photo-picker" id="photo-picker">
          <img id="photo-preview" style="display:none">
          <div class="photo-picker-label" id="photo-label">
            <div class="icon">📷</div>
            <p>Tap to photograph the label</p>
          </div>
        </div>
        <input type="file" id="photo-input" accept="image/*" style="display:none">
      </div>
      <div class="form-group">
        <label class="form-label" for="f-name">Wine name</label>
        <input class="form-input" id="f-name" type="text" placeholder="e.g. Château Margaux">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="f-vintage">Vintage</label>
          <input class="form-input" id="f-vintage" type="number" placeholder="2019">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-varietal">Varietal</label>
          <input class="form-input" id="f-varietal" type="text" placeholder="Cabernet Sauvignon">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="f-region">Region</label>
          <input class="form-input" id="f-region" type="text" placeholder="Bordeaux">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-producer">Producer</label>
          <input class="form-input" id="f-producer" type="text" placeholder="Estate name">
        </div>
      </div>
      <div class="form-group">
        <div class="form-label">Rating</div>
        <div class="rating-display">
          <div class="rating-number" id="rating-display">7.5</div>
          <div class="rating-label">out of 10</div>
        </div>
        <input class="rating-slider" id="f-rating" type="range" min="0" max="10" step="0.5" value="7.5">
        <div class="rating-ticks">
          <span>0</span><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-notes">Tasting notes</label>
        <textarea class="form-textarea" id="f-notes" placeholder="Aromas, flavors, texture, finish…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-occasion">Occasion / Pairing</label>
        <input class="form-input" id="f-occasion" type="text" placeholder="e.g. Anniversary dinner">
      </div>
      <button class="btn-save" id="btn-save">Save to journal</button>
    </div>
  </div>
</div>

<!-- JOURNAL DETAIL OVERLAY -->
<div class="overlay" id="detail-overlay">
  <div class="detail-sheet" id="detail-sheet">
    <div class="detail-drag-handle"></div>
    <div class="detail-sheet-header">
      <span class="sheet-title">Tasting note</span>
    </div>
    <div class="detail-scroll-body" id="detail-scroll-body">
      <div class="detail-photo" id="detail-photo"><div class="no-photo">🍷</div></div>
      <div class="detail-body">
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-meta" id="detail-meta"></div>
        <div class="detail-score-row">
          <div class="detail-score-num" id="detail-score"></div>
          <div class="detail-score-info">
            <div class="detail-score-bar-bg"><div class="detail-score-bar-fill" id="detail-bar"></div></div>
            <div class="detail-score-label" id="detail-score-label"></div>
          </div>
        </div>
        <div id="detail-notes-wrap" style="display:none">
          <div class="detail-section-label">Tasting notes</div>
          <div class="detail-notes" id="detail-notes"></div>
        </div>
        <div id="detail-occasion-wrap" style="display:none">
          <div class="detail-section-label" style="margin-top:12px">Occasion</div>
          <div class="detail-notes" id="detail-occasion" style="font-style:normal"></div>
        </div>
        <div class="detail-actions" style="margin-top:16px;padding-bottom:100px">
          <button class="btn-edit" id="btn-edit">Edit</button>
          <button class="btn-delete" id="btn-delete">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CELLAR FORM OVERLAY -->
<div class="overlay" id="cellar-form-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="cellar-form-title">Add to cellar</span>
      <div class="sheet-header-actions">
        <button class="btn-cancel" id="cellar-form-cancel">Cancel</button>
        <button class="btn-close" id="cellar-form-close">✕</button>
      </div>
    </div>
    <div class="form-body">
      <div class="form-group">
        <div class="form-label">Bottle photo</div>
        <div class="photo-picker" id="cellar-photo-picker">
          <img id="cellar-photo-preview" style="display:none">
          <div class="photo-picker-label" id="cellar-photo-label">
            <div class="icon">📷</div>
            <p>Tap to photograph the bottle</p>
          </div>
        </div>
        <input type="file" id="cellar-photo-input" accept="image/*" style="display:none">
      </div>
      <div class="form-group">
        <label class="form-label" for="cf-name">Wine name</label>
        <input class="form-input" id="cf-name" type="text" placeholder="e.g. Château Margaux">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="cf-vintage">Vintage</label>
          <input class="form-input" id="cf-vintage" type="number" placeholder="2019">
        </div>
        <div class="form-group">
          <label class="form-label" for="cf-varietal">Varietal</label>
          <input class="form-input" id="cf-varietal" type="text" placeholder="Cabernet Sauvignon">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="cf-region">Region</label>
          <input class="form-input" id="cf-region" type="text" placeholder="Bordeaux">
        </div>
        <div class="form-group">
          <label class="form-label" for="cf-producer">Producer</label>
          <input class="form-input" id="cf-producer" type="text" placeholder="Estate name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="cf-quantity">Bottles in cellar</label>
        <input class="form-input" id="cf-quantity" type="number" placeholder="1" min="1">
      </div>
      <div class="form-group">
        <label class="form-label" for="cf-notes">Tasting notes</label>
        <textarea class="form-textarea" id="cf-notes" placeholder="Aromas, flavors, texture, finish…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="cf-pairing">Pairing notes</label>
        <textarea class="form-textarea" id="cf-pairing" placeholder="Food pairings…"></textarea>
      </div>
      <button class="btn-save" id="cellar-btn-save">Save to cellar</button>
    </div>
  </div>
</div>

<!-- CELLAR DETAIL OVERLAY -->
<div class="overlay" id="cellar-detail-overlay">
  <div class="detail-sheet" id="cellar-detail-sheet">
    <div class="detail-drag-handle"></div>
    <div class="detail-sheet-header">
      <span class="sheet-title">Cellar</span>
    </div>
    <div class="detail-scroll-body" id="cellar-detail-scroll">
      <div class="detail-photo" id="cellar-detail-photo"><div class="no-photo">🍾</div></div>
      <div class="detail-body">
        <div class="detail-name" id="cellar-detail-name"></div>
        <div class="detail-meta" id="cellar-detail-meta"></div>
        <div class="detail-score-row">
          <div style="font-size:36px">🍾</div>
          <div class="detail-score-info">
            <div style="font-size:28px;font-family:var(--serif);color:var(--gold)" id="cellar-detail-qty"></div>
            <div class="detail-score-label">bottles in cellar</div>
          </div>
        </div>
        <div id="cellar-detail-notes-wrap" style="display:none">
          <div class="detail-section-label">Tasting notes</div>
          <div class="detail-notes" id="cellar-detail-notes"></div>
        </div>
        <div id="cellar-detail-pairing-wrap" style="display:none">
          <div class="detail-section-label" style="margin-top:12px">Pairing notes</div>
          <div class="detail-notes" id="cellar-detail-pairing" style="font-style:normal"></div>
        </div>
        <div class="detail-actions" style="margin-top:16px;padding-bottom:100px">
          <button class="btn-edit" id="cellar-btn-edit">Edit</button>
          <button class="btn-delete" id="cellar-btn-delete">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- FLOATING CLOSE - outside all overlays, always tappable -->
<button id="floating-close">✕ Close</button>

<script>
// ── GLOBALS ──
const DB_KEY = 'cellar_wines';
const CELLAR_KEY = 'cellar_inventory';
let wines = [];
let cellarWines = [];
let currentId = null;
let cellarCurrentId = null;
let currentSort = 'date';
let currentSearch = '';
let cellarSearch = '';
let formPhotoData = null;
let formEditId = null;
let cellarPhotoData = null;
let cellarFormEditId = null;

// ── STORAGE ──
function load() { try { wines = JSON.parse(localStorage.getItem(DB_KEY)) || []; } catch { wines = []; } }
function save() { localStorage.setItem(DB_KEY, JSON.stringify(wines)); }
function loadCellar() { try { cellarWines = JSON.parse(localStorage.getItem(CELLAR_KEY)) || []; } catch { cellarWines = []; } }
function saveCellar() { localStorage.setItem(CELLAR_KEY, JSON.stringify(cellarWines)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── RATING LABELS ──
function ratingLabel(n) {
  if (n >= 9.5) return 'Transcendent';
  if (n >= 9) return 'Exceptional';
  if (n >= 8.5) return 'Outstanding';
  if (n >= 8) return 'Excellent';
  if (n >= 7.5) return 'Very good';
  if (n >= 7) return 'Good';
  if (n >= 6) return 'Acceptable';
  if (n >= 4) return 'Below average';
  return 'Not recommended';
}

// ── FLOATING CLOSE ──
const floatingCloseBtn = document.getElementById('floating-close');
function showClose(fn) {
  floatingCloseBtn.style.display = 'block';
  floatingCloseBtn.onclick = fn;
}
function hideClose() {
  floatingCloseBtn.style.display = 'none';
  floatingCloseBtn.onclick = null;
}

// ── TABS ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── JOURNAL RENDER ──
function renderList() {
  const el = document.getElementById('wine-list');
  let list = [...wines];
  const q = currentSearch.trim().toLowerCase();
  if (q) list = list.filter(w => [w.name,w.vintage,w.varietal,w.region,w.producer,w.notes,w.occasion].some(f => f && String(f).toLowerCase().includes(q)));
  switch (currentSort) {
    case 'rating': list.sort((a,b) => (b.rating??0)-(a.rating??0)); break;
    case 'name': list.sort((a,b) => (a.name||'').localeCompare(b.name||'')); break;
    case 'vintage': list.sort((a,b) => (b.vintage||0)-(a.vintage||0)); break;
    default: list.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
  }
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🍷</div><h3>${wines.length?'No wines match':'Your journal is empty'}</h3><p>${wines.length?'Try a different search.':'Tap + to log your first wine.'}</p></div>`;
    return;
  }
  el.innerHTML = list.map(w => {
    const meta = [w.vintage,w.region,w.producer].filter(Boolean).join(' · ');
    return `<div class="wine-card" data-id="${w.id}">
      <div class="wine-card-img">${w.photo?`<img src="${w.photo}" loading="lazy">`:`<div class="no-photo">🍷</div>`}</div>
      <div class="wine-card-body">
        <div class="wine-card-name">${esc(w.name||'Unnamed wine')}</div>
        <div class="wine-card-meta">${esc(meta||'No details')}</div>
        <div class="wine-card-footer">
          <div class="wine-rating-badge"><span class="score">${w.rating??'—'}</span><span class="max">/ 10</span></div>
          ${w.varietal?`<div class="wine-varietal-tag">${esc(w.varietal)}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.wine-card').forEach(c => c.addEventListener('click', () => openDetail(c.dataset.id)));
}

// ── JOURNAL DETAIL ──
function openDetail(id) {
  const w = wines.find(x => x.id === id);
  if (!w) return;
  currentId = id;
  document.getElementById('detail-scroll-body').scrollTop = 0;
  const photoEl = document.getElementById('detail-photo');
  photoEl.innerHTML = '';
  if (w.photo) { const img = document.createElement('img'); img.src = w.photo; photoEl.appendChild(img); }
  else { const d = document.createElement('div'); d.className = 'no-photo'; d.textContent = '🍷'; photoEl.appendChild(d); }
  document.getElementById('detail-name').textContent = w.name || 'Unnamed wine';
  document.getElementById('detail-meta').textContent = [w.vintage,w.varietal,w.region,w.producer].filter(Boolean).join(' · ');
  document.getElementById('detail-score').textContent = w.rating ?? '—';
  document.getElementById('detail-bar').style.width = `${((w.rating??0)/10)*100}%`;
  document.getElementById('detail-score-label').textContent = ratingLabel(w.rating??0);
  const nw = document.getElementById('detail-notes-wrap');
  if (w.notes) { nw.style.display=''; document.getElementById('detail-notes').textContent=w.notes; } else { nw.style.display='none'; }
  const ow = document.getElementById('detail-occasion-wrap');
  if (w.occasion) { ow.style.display=''; document.getElementById('detail-occasion').textContent=w.occasion; } else { ow.style.display='none'; }
  document.getElementById('detail-overlay').classList.add('open');
  showClose(closeDetail);
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-sheet').style.transform = '';
  currentId = null;
  hideClose();
}

document.getElementById('detail-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
document.getElementById('btn-delete').addEventListener('click', () => {
  if (!confirm('Delete this wine?')) return;
  wines = wines.filter(w => w.id !== currentId);
  save(); renderList(); closeDetail();
});
document.getElementById('btn-edit').addEventListener('click', () => {
  const w = wines.find(x => x.id === currentId);
  if (!w) return;
  closeDetail();
  openForm(w);
});

// Swipe detail sheet
addSwipe(document.getElementById('detail-sheet'), closeDetail, document.getElementById('detail-scroll-body'));

// ── JOURNAL FORM ──
function openForm(wine) {
  formEditId = wine?.id || null;
  document.getElementById('form-title').textContent = wine ? 'Edit wine' : 'Add a wine';
  document.getElementById('f-name').value = wine?.name || '';
  document.getElementById('f-vintage').value = wine?.vintage || '';
  document.getElementById('f-varietal').value = wine?.varietal || '';
  document.getElementById('f-region').value = wine?.region || '';
  document.getElementById('f-producer').value = wine?.producer || '';
  document.getElementById('f-rating').value = wine?.rating ?? 7.5;
  document.getElementById('f-notes').value = wine?.notes || '';
  document.getElementById('f-occasion').value = wine?.occasion || '';
  document.getElementById('rating-display').textContent = wine?.rating ?? 7.5;
  formPhotoData = wine?.photo || null;
  const prev = document.getElementById('photo-preview');
  const lbl = document.getElementById('photo-label');
  if (formPhotoData) { prev.src=formPhotoData; prev.style.display=''; lbl.style.display='none'; }
  else { prev.style.display='none'; lbl.style.display=''; }
  document.getElementById('form-overlay').classList.add('open');
}

function closeForm() { document.getElementById('form-overlay').classList.remove('open'); }
document.getElementById('form-cancel').addEventListener('click', closeForm);
document.getElementById('form-close').addEventListener('click', closeForm);
document.getElementById('form-overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeForm(); });
document.getElementById('f-rating').addEventListener('input', function() { document.getElementById('rating-display').textContent = this.value; });
document.getElementById('photo-picker').addEventListener('click', () => document.getElementById('photo-input').click());
document.getElementById('photo-input').addEventListener('change', function() {
  const file = this.files[0]; if (!file) return;
  processPhoto(file, data => {
    formPhotoData = data;
    const prev = document.getElementById('photo-preview');
    prev.src=data; prev.style.display='';
    document.getElementById('photo-label').style.display='none';
  });
  this.value='';
});
document.getElementById('btn-save').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Please enter a wine name.'); return; }
  const existing = formEditId ? wines.find(w => w.id===formEditId) : null;
  const wine = {
    id: existing?.id || genId(), name,
    vintage: document.getElementById('f-vintage').value || '',
    varietal: document.getElementById('f-varietal').value.trim(),
    region: document.getElementById('f-region').value.trim(),
    producer: document.getElementById('f-producer').value.trim(),
    rating: parseFloat(document.getElementById('f-rating').value),
    notes: document.getElementById('f-notes').value.trim(),
    occasion: document.getElementById('f-occasion').value.trim(),
    photo: formPhotoData,
    createdAt: existing?.createdAt || Date.now(),
    updatedAt: Date.now(),
  };
  if (existing) { wines = wines.map(w => w.id===wine.id?wine:w); } else { wines.unshift(wine); }
  save(); renderList(); closeForm(); formEditId=null;
});

// ── CELLAR RENDER ──
function renderCellar() {
  const el = document.getElementById('cellar-list');
  let list = [...cellarWines];
  const q = cellarSearch.trim().toLowerCase();
  if (q) list = list.filter(w => [w.name,w.vintage,w.varietal,w.region,w.producer,w.notes,w.pairing].some(f => f && String(f).toLowerCase().includes(q)));
  list.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🍾</div><h3>${cellarWines.length?'No wines match':'Your cellar is empty'}</h3><p>${cellarWines.length?'Try a different search.':'Tap + to add a bottle.'}</p></div>`;
    return;
  }
  el.innerHTML = list.map(w => {
    const meta = [w.vintage,w.varietal,w.region].filter(Boolean).join(' · ');
    return `<div class="cellar-card" data-id="${w.id}">
      <div class="cellar-card-img">${w.photo?`<img src="${w.photo}" loading="lazy">`:`<div class="no-photo">🍾</div>`}</div>
      <div class="cellar-card-body">
        <div class="cellar-card-name">${esc(w.name||'Unnamed wine')}</div>
        <div class="cellar-card-meta">${esc(meta||'No details')}</div>
        <span class="cellar-qty-badge">🍾 ${w.quantity||1} bottle${(w.quantity||1)!==1?'s':''}</span>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.cellar-card').forEach(c => c.addEventListener('click', () => openCellarDetail(c.dataset.id)));
}

// ── CELLAR DETAIL ──
function openCellarDetail(id) {
  const w = cellarWines.find(x => x.id===id);
  if (!w) return;
  cellarCurrentId = id;
  document.getElementById('cellar-detail-scroll').scrollTop = 0;
  const photoEl = document.getElementById('cellar-detail-photo');
  photoEl.innerHTML = '';
  if (w.photo) { const img=document.createElement('img'); img.src=w.photo; photoEl.appendChild(img); }
  else { const d=document.createElement('div'); d.className='no-photo'; d.textContent='🍾'; photoEl.appendChild(d); }
  document.getElementById('cellar-detail-name').textContent = w.name||'Unnamed wine';
  document.getElementById('cellar-detail-meta').textContent = [w.vintage,w.varietal,w.region,w.producer].filter(Boolean).join(' · ');
  document.getElementById('cellar-detail-qty').textContent = w.quantity||1;
  const nw=document.getElementById('cellar-detail-notes-wrap');
  if (w.notes) { nw.style.display=''; document.getElementById('cellar-detail-notes').textContent=w.notes; } else { nw.style.display='none'; }
  const pw=document.getElementById('cellar-detail-pairing-wrap');
  if (w.pairing) { pw.style.display=''; document.getElementById('cellar-detail-pairing').textContent=w.pairing; } else { pw.style.display='none'; }
  document.getElementById('cellar-detail-overlay').classList.add('open');
  showClose(closeCellarDetail);
}

function closeCellarDetail() {
  document.getElementById('cellar-detail-overlay').classList.remove('open');
  document.getElementById('cellar-detail-sheet').style.transform = '';
  cellarCurrentId = null;
  hideClose();
}

document.getElementById('cellar-detail-overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeCellarDetail(); });
document.getElementById('cellar-btn-delete').addEventListener('click', () => {
  if (!confirm('Remove this wine from your cellar?')) return;
  cellarWines = cellarWines.filter(w => w.id!==cellarCurrentId);
  saveCellar(); renderCellar(); closeCellarDetail();
});
document.getElementById('cellar-btn-edit').addEventListener('click', () => {
  const w = cellarWines.find(x => x.id===cellarCurrentId);
  if (!w) return;
  closeCellarDetail(); openCellarForm(w);
});

addSwipe(document.getElementById('cellar-detail-sheet'), closeCellarDetail, document.getElementById('cellar-detail-scroll'));

// ── CELLAR FORM ──
function openCellarForm(wine) {
  cellarFormEditId = wine?.id || null;
  document.getElementById('cellar-form-title').textContent = wine ? 'Edit bottle' : 'Add to cellar';
  document.getElementById('cf-name').value = wine?.name||'';
  document.getElementById('cf-vintage').value = wine?.vintage||'';
  document.getElementById('cf-varietal').value = wine?.varietal||'';
  document.getElementById('cf-region').value = wine?.region||'';
  document.getElementById('cf-producer').value = wine?.producer||'';
  document.getElementById('cf-quantity').value = wine?.quantity||1;
  document.getElementById('cf-notes').value = wine?.notes||'';
  document.getElementById('cf-pairing').value = wine?.pairing||'';
  cellarPhotoData = wine?.photo||null;
  const prev=document.getElementById('cellar-photo-preview');
  const lbl=document.getElementById('cellar-photo-label');
  if (cellarPhotoData) { prev.src=cellarPhotoData; prev.style.display=''; lbl.style.display='none'; }
  else { prev.style.display='none'; lbl.style.display=''; }
  document.getElementById('cellar-form-overlay').classList.add('open');
}

function closeCellarForm() { document.getElementById('cellar-form-overlay').classList.remove('open'); }
document.getElementById('cellar-form-cancel').addEventListener('click', closeCellarForm);
document.getElementById('cellar-form-close').addEventListener('click', closeCellarForm);
document.getElementById('cellar-form-overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeCellarForm(); });
document.getElementById('cellar-photo-picker').addEventListener('click', () => document.getElementById('cellar-photo-input').click());
document.getElementById('cellar-photo-input').addEventListener('change', function() {
  const file=this.files[0]; if (!file) return;
  processPhoto(file, data => {
    cellarPhotoData=data;
    const prev=document.getElementById('cellar-photo-preview');
    prev.src=data; prev.style.display='';
    document.getElementById('cellar-photo-label').style.display='none';
  });
  this.value='';
});
document.getElementById('cellar-btn-save').addEventListener('click', () => {
  const name=document.getElementById('cf-name').value.trim();
  if (!name) { alert('Please enter a wine name.'); return; }
  const existing=cellarFormEditId?cellarWines.find(w=>w.id===cellarFormEditId):null;
  const wine={
    id:existing?.id||genId(), name,
    vintage:document.getElementById('cf-vintage').value||'',
    varietal:document.getElementById('cf-varietal').value.trim(),
    region:document.getElementById('cf-region').value.trim(),
    producer:document.getElementById('cf-producer').value.trim(),
    quantity:parseInt(document.getElementById('cf-quantity').value)||1,
    notes:document.getElementById('cf-notes').value.trim(),
    pairing:document.getElementById('cf-pairing').value.trim(),
    photo:cellarPhotoData,
    createdAt:existing?.createdAt||Date.now(),
    updatedAt:Date.now(),
  };
  if (existing) { cellarWines=cellarWines.map(w=>w.id===wine.id?wine:w); } else { cellarWines.unshift(wine); }
  saveCellar(); renderCellar(); closeCellarForm(); cellarFormEditId=null;
});

// ── ADD BUTTON ──
document.getElementById('btn-add').addEventListener('click', () => {
  const tab = document.querySelector('.tab-btn.active').dataset.tab;
  if (tab === 'cellar') { cellarFormEditId=null; openCellarForm(null); }
  else { formEditId=null; openForm(null); }
});

// ── SEARCH & SORT ──
document.getElementById('search-input').addEventListener('input', function() { currentSearch=this.value; renderList(); });
document.getElementById('cellar-search-input').addEventListener('input', function() { cellarSearch=this.value; renderCellar(); });
document.querySelectorAll('.sort-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentSort = chip.dataset.sort;
    renderList();
  });
});

// ── EXPORT / IMPORT ──
document.getElementById('btn-export').addEventListener('click', () => {
  if (!wines.length) { alert('No wines to export.'); return; }
  const blob = new Blob([JSON.stringify(wines,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`wine-journal-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
});
document.getElementById('btn-import').addEventListener('click', () => document.getElementById('import-input').click());
document.getElementById('import-input').addEventListener('change', function() {
  const file=this.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const imported=JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error();
      const ids=wines.map(w=>w.id);
      let added=0;
      imported.forEach(w=>{ if (w.id&&w.name&&!ids.includes(w.id)) { wines.push(w); added++; } });
      save(); renderList();
      alert(`Import complete. ${added} wine${added!==1?'s':''} added.`);
    } catch { alert("Could not read that file. Make sure it's a Wine Cellar backup."); }
  };
  reader.readAsText(file); this.value='';
});

// ── PHOTO PROCESSING ──
function processPhoto(file, callback) {
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=1200;
      let w=img.width, h=img.height;
      if (w>MAX||h>MAX) { if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      callback(canvas.toDataURL('image/jpeg',0.75));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── SWIPE TO CLOSE ──
function addSwipe(sheet, closeFn, scrollBody) {
  const handle = sheet.querySelector('.detail-drag-handle');
  const header = sheet.querySelector('.detail-sheet-header');
  let startY=0, dragging=false;

  function onStart(e) {
    startY = (e.touches?.[0]||e).clientY;
    dragging = true;
    sheet.style.transition = 'none';
  }
  function onMove(e) {
    if (!dragging) return;
    const dy = (e.touches?.[0]||e).clientY - startY;
    if (dy > 0) sheet.style.transform = `translateY(${Math.round(dy)}px)`;
  }
  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    const dy = (e.changedTouches?.[0]||e).clientY - startY;
    if (dy > 80) {
      sheet.style.transition = 'transform 0.25s ease';
      sheet.style.transform = 'translateY(110%)';
      setTimeout(() => { closeFn(); sheet.style.transition=''; sheet.style.transform=''; }, 260);
    } else {
      sheet.style.transition = 'transform 0.2s ease';
      sheet.style.transform = '';
      setTimeout(() => { sheet.style.transition=''; }, 220);
    }
  }

  [handle, header].forEach(el => {
    if (!el) return;
    el.addEventListener('touchstart', onStart, {passive:true});
    el.addEventListener('touchmove', onMove, {passive:true});
    el.addEventListener('touchend', onEnd, {passive:true});
  });
}

// ── INIT ──
load();
loadCellar();
renderList();
renderCellar();
</script>
